name: Terraform CI

on:
  pull_request:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      # 1. TFLint
      - name: Run TFLint
        uses: terraform-linters/setup-tflint@v3

      - name: TFLint Init
        run: tflint --init

      - name: TFLint Run
        run: tflint

      # 2. Checkov
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master

      # 3. Validate
      - name: Terraform Validate
        run: terraform validate
